# POLICY 1: Deny all ingress and egress traffic by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: online-boutique
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# POLICY 2: Allow frontend to receive traffic from loadgenerator and ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: online-boutique
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: loadgenerator
  - ports:
    - port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: cartservice
  - to:
    - podSelector:
        matchLabels:
          app: productcatalogservice
  - to:
    - podSelector:
        matchLabels:
          app: currencyservice
  - to:
    - podSelector:
        matchLabels:
          app: recommendationservice
  - to:
    - podSelector:
        matchLabels:
          app: checkoutservice
  - to:
    - podSelector:
        matchLabels:
          app: adservice
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# POLICY 3: Allow checkoutservice traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-checkoutservice
  namespace: online-boutique
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: cartservice
  - to:
    - podSelector:
        matchLabels:
          app: paymentservice
  - to:
    - podSelector:
        matchLabels:
          app: shippingservice
  - to:
    - podSelector:
        matchLabels:
          app: emailservice
  - to:
    - podSelector:
        matchLabels:
          app: currencyservice
  - to:
    - podSelector:
        matchLabels:
          app: productcatalogservice
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# POLICY 4: Allow cartservice to receive and talk to redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cartservice
  namespace: online-boutique
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
  - from:
    - podSelector:
        matchLabels:
          app: checkoutservice
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis-cart
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
# POLICY 5: Allow redis to only receive from cartservice
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: online-boutique
spec:
  podSelector:
    matchLabels:
      app: redis-cart
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: cartservice
---
# POLICY 6: Allow remaining backend services to receive from their callers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-services
  namespace: online-boutique
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
